{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
                <div class="card-header bg-danger text-white text-center py-4 border-0">
                    <h3 class="mb-0 fw-bold">
                        <i class="fas fa-sign-in-alt me-2"></i>Вход в систему
                    </h3>
                    <p class="mb-0 mt-2 opacity-75">Доступ к личному кабинету и заявкам</p>
                </div>
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                <i class="fas fa-user text-danger me-1"></i> Имя пользователя
                            </label>
                            <input type="text" name="username" class="form-control form-control-lg"
                                   placeholder="Введите логин" autofocus required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">
                                <i class="fas fa-lock text-danger me-1"></i> Пароль
                            </label>
                            <input type="password" name="password" class="form-control form-control-lg"
                                   placeholder="Введите пароль" required>
                        </div>

                        {% if form.errors %}
                            <div class="alert alert-danger py-2 mb-3">
                                <i class="fas fa-exclamation-triangle me-2"></i>
                                Неверное имя пользователя или пароль.
                            </div>
                        {% endif %}

                        <button type="submit" class="btn btn-danger w-100 py-2 fw-bold">
                            <i class="fas fa-arrow-right-to-bracket me-2"></i>Войти
                        </button>
                    </form>
                </div>
                <div class="card-footer bg-light text-center py-3 border-0">
                    <p class="mb-0">
                        Нет аккаунта?
                        <a href="{% url 'register' %}" class="text-danger fw-bold">
                            <i class="fas fa-user-plus me-1"></i>Зарегистрируйтесь
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
